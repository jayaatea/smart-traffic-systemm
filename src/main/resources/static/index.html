<!DOCTYPE html>
<html>

<head>
    <title>Smart Traffic System</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: black;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="box">

    <h1>Smart Traffic System</h1>

    <input type="text"
           id="vehicleId"
           placeholder="Enter Vehicle Number">

    <br><br>

    <button onclick="searchVehicle()">
        Search Fine
    </button>

    <div id="result"></div>

</div>

<script>

    async function searchVehicle() {

        const vehicleId =
            document.getElementById("vehicleId").value;

        const response = await fetch(
            "/traffic/search/" + vehicleId
        );

        const result = await response.text();

        document.getElementById("result").innerText = result;
    }

</script>

</body>
</html>
